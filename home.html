<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kinorama.dev</title>
    <link rel="shortcut icon" href="http://example.com/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --bg2: #12121a;
            --bg3: #1a1a26;
            --bg4: #22222f;
            --border: #2a2a3a;
            --border-hover: #3a3a50;
            --t1: #e8e8f0;
            --t2: #a0a0b8;
            --t3: #6a6a82;
            --accent: #7c6aff;
            --accent2: #a78bfa;
            --accent-glow: rgba(124, 106, 255, 0.15);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.12);
            --radius: 10px;
            --radius-lg: 16px;
        }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(ellipse, rgba(124, 106, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70vw;
            height: 70vh;
            background: radial-gradient(ellipse, rgba(52, 211, 153, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── nav ── */
        nav {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 580px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
        }

        .nav-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--t2);
            letter-spacing: 1px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-logo:hover { color: var(--accent2); }

        .nav-links { display: flex; gap: 4px; }

        .nav-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            color: var(--t3);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 99px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .nav-link:hover {
            color: var(--t1);
            border-color: var(--border);
            background: var(--bg3);
        }
        .nav-link.active {
            color: var(--accent2);
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── hero ── */
        .hero {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            text-align: center;
            padding: 56px 0 40px;
        }

        .hero-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            color: var(--accent2);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 16px;
            background: var(--accent-glow);
            border: 1px solid rgba(124, 106, 255, 0.2);
            border-radius: 99px;
            margin-bottom: 24px;
        }

        .hero h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--t1) 30%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 16px;
            color: var(--t2);
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ── card ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }
        .card:hover { border-color: var(--border-hover); }

        .card-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent2);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .discord-wrapper {
            width: 100%;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .discord-wrapper iframe {
            display: block;
            width: 100%;
            height: 420px;
            border: none;
        }

        /* ── tools grid ── */
        .tools-grid {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tool-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            padding: 24px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--t1);
            transition: all 0.25s cubic-bezier(.4,0,.2,1);
            position: relative;
            overflow: hidden;
        }
        .tool-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 60%, var(--accent-glow));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(124, 106, 255, 0.15);
        }
        .tool-card:hover::after { opacity: 1; }

        .tool-card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .tool-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 20px;
            position: relative;
            z-index: 1;
            transition: all 0.2s;
        }
        .tool-card:hover .tool-icon {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .tool-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .tool-desc {
            font-size: 13px;
            color: var(--t3);
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }

        .tool-arrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--t3);
            margin-top: auto;
            position: relative;
            z-index: 1;
            transition: all 0.2s;
        }
        .tool-card:hover .tool-arrow {
            color: var(--accent2);
            transform: translateX(4px);
        }

        /* ── social row ── */
        .social-row {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            display: flex;
            gap: 12px;
        }

        .social-link {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--t2);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .social-link:hover {
            border-color: var(--border-hover);
            color: var(--t1);
            background: var(--bg3);
        }
        .social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* ── footer ── */
        footer {
            position: relative;
            z-index: 1;
            padding: 40px 0 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--t3);
        }

        /* ── entrance animation ── */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s cubic-bezier(.4,0,.2,1) forwards;
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .d1 { animation-delay: 0s; }
        .d2 { animation-delay: 0.08s; }
        .d3 { animation-delay: 0.16s; }
        .d4 { animation-delay: 0.24s; }
        .d5 { animation-delay: 0.32s; }

        @media (max-width: 480px) {
            .hero h1 { font-size: 32px; }
            .tools-grid { grid-template-columns: 1fr; }
            .tool-card { flex-direction: row; align-items: center; padding: 18px; gap: 14px; }
            .tool-card .tool-desc { display: none; }
            .tool-arrow { margin-left: auto; margin-top: 0; }
            .social-row { flex-direction: column; }
        }
    </style>
</head>
